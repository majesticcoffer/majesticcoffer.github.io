<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist | Majestic Coffer</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
<meta property="og:site_name" content="Majestic Coffer">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Majestic Coffer",
  "alternateName": ["Majestic Coffer", "Majestic Coffer Bangladesh"],
  "url": "https://majesticcoffer.netlify.app/"
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Majestic Coffer",
  "alternateName": "Majestic Coffer - Luxury Handcrafted Store",
  "url": "https://majesticcoffer.netlify.app/",
  "logo": "https://majesticcoffer.netlify.app/images/logo-512.png",
  "sameAs": ["https://www.facebook.com/majesticcoffer/"]
}
</script>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

<header>
    <a href="index.html" class="logo">
        <img src="images/logo-new.png" alt="Majestic Coffer logo" class="logo-mark-img" width="46" height="46">
        <div>
            <span class="logo-name">Majestic Coffer</span>
            <small>Luxury Handcrafted Store</small>
        </div>
    </a>

    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#products">Products</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="header-icons">
        <a href="index.html#products" aria-label="Search products"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="wishlist.html" aria-label="Wishlist"><i class="fa-solid fa-heart"></i></a>
        <a href="cart.html" class="cart-icon" aria-label="Shopping cart">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cart-count">0</span>
        </a>
    </div>
</header>

<main>

<section class="cart-page">
    <div class="section-title">
        <span class="eyebrow">Saved For Later</span>
        <h2>My Wishlist ❤️</h2>
        <div class="lattice-rule"></div>
    </div>

    <div id="wishlist-items"><!-- Wishlist items load here --></div>
</section>

</main>

<div class="bottom-bar">
    <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
    <a href="wishlist.html"><i class="fa-regular fa-heart"></i><span>Wishlist</span></a>
    <a href="cart.html" class="cart-icon" aria-label="Shopping cart">
        <i class="fa-solid fa-cart-shopping"></i><span>Cart</span>
        <span class="bb-badge" id="bb-cart-count">0</span>
    </a>
    <button class="bb-order" onclick="orderNowGlobal()">
        <i class="fa-brands fa-whatsapp"></i><span>Order Now</span>
    </button>
</div>
<div class="toast" id="toast"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/script.js"></script>
<script src="js/wishlist.js"></script>

</body>
</html>
